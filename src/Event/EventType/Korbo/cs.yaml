  cancel-payment:
    registerAgain: 'Chceš se stále zúčastnit akce? Uprav a uzamkni svou přihlášku znovu'
  payment-successful:
        enjoy: |
            Milý Korbáčku,<br/>
            <br/>
            díky, že ses přihlásil/a na KORBO 2026 a zaplatil/a registrační poplatek. Teď už ti nic nebrání dorazit, užít si louku, lidi, pohodu — a taky přidat něco vlastního.<br/>
            <br/>
            Přinášíme důležité info! Mail si schovej, ať ho později nemusíš lovit v hlubinách schránky.<br/>
            <br/>
            <h2>Co je KORBO?</h2>
            Akce, kde dostaneš prostor a zázemí  — ale samotný program tvoří hlavně účastníci, tedy i TY. Pokud jsi tu poprvé, nebo si chceš jen něco připomenout, mrkni na <a href="https://korbo.skauting.cz/obecne-principy/"><b>PRINCIPY KORBA</b></a> a další info na webu.<br/>
            <br/>
            <b>Aktivity?</b> Sice můžeš být skautem spacákovým, ale srdce dění je v aktivitách — hry, tvoření, jóga, deskovky, přednášky, cokoliv tě napadne.<br/>
            <br/>
            Máš nápad? Zapiš ho do <a href="https://teamup.com/ks5yv8pg2g7cwanbk5"><b>TABULKY AKTIVIT</b></a>. Objevuj a přispívej!<br/>
            <br/>
            <b>Místa?</b> Placy, které dělají Korbo Korbem, bez nich by to nebylo ono — třeba galerie, čajovna, jídloplac nebo něco úplně nového. Chceš se svým oddílem nebo partou něco vytvořit? Dej nám vědět přes <a href="https://forms.gle/9VJpzcnmRV6C1XMU9"><b>FORMULÁŘ</b></a> a my se ti ozveme.<br/>
            <br/>
            <b>Potřebuješ podporu?</b></br>
            <br/>
            Potřebuje tvá aktivita či místo materiální/finanční podporu? Piš hned na <a href="mailto:korbo@skaut.cz"><b>korbo@skaut.cz</b></a>. Čím dřív, tím líp. Více info najdeš v <a href="https://korbo.skauting.cz/finance-pro-mista-a-aktivity">pravidlech financování.</a><br/>
            <br/>
            <b>Buď v obraze</b><br/>
            <br/>
            Sleduj náš <a href="https://www.instagram.com/korboskaut">Instagram</a>, připoj se do <a href="https://chat.whatsapp.com/KcZRz8aZKNFFbbXwBHCsri">WhatsApp skupiny</a> a koukej občas i do mailu.<br/>
            <br/>
            Těšíme se na tebe! Užij si Korbo naplno, s respektem k ostatním, ke skautskému zákonu i zákonům ČR<br/>
            <br/>
            #udelejsisam

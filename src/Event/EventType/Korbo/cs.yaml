    successfullySent: |
      Odeslání tvé přihlášky na KORBO 2026 proběhlo úspěšně. Nyní musíme zkontrolovat, zda je všechno v pořádku, a pokud je, pošleme ti platební údaje. Mohlo by to trvat i několik dní, prosíme tedy o trpělivost. :)
      <br/>
      Mezitím budeme rádi, pokud nám vyplníš <a href="https://forms.gle/ZXW1AXiyMyR9R4Vh9">tento krátký dotazník</a>, který nezabere více jak 3 minuty a pomůže nám v přípravách akce.
